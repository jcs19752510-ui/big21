<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>변수와상수</title>
</head>
<body>

    <script>
        // /const : 재할당 불가
        const siteNmae = '나의블로그'
        console.log(siteNmae); // 나의블로그
        // siteNmae = '다른블로그'; // TypeError: Assignment to constant variable.

        // let : 재할당 가능
        let score = 80;
        console.log('초기 점수:', score);
        score = 95; // 재할당 가능
        console.log('수정 점수:', score);
        // 블록 스코프 예시
        {
            const blockVar = '블록 안에서만 유효';
            console.log(blockVar); // 블록 안에서만 유효
        }
        // console.log(blockVar);

        // var의 문제: 블록을 벗어나도 접근 가능
        if (true) {
            var leaky = 'var는 블록을 탈출한다';
        }
        console.log(leaky); // var는 블록을 탈출한다 (버그 위험)
        
    </script>
    
</body>
</html>
